<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Mathletes icon mark: robot jumping above podium bars -->
  <g fill="#D85A30">
    <!-- podium bars -->
    <rect x="50" y="120" width="28" height="44" rx="4"/>
    <rect x="86" y="90" width="28" height="74" rx="4"/>
    <rect x="122" y="103" width="28" height="61" rx="4"/>

    <!-- robot jumping above tallest bar -->
    <!-- arms -->
    <line x1="80" y1="56" x2="66" y2="44" stroke="#D85A30" stroke-width="6" stroke-linecap="round"/>
    <line x1="120" y1="56" x2="134" y2="44" stroke="#D85A30" stroke-width="6" stroke-linecap="round"/>
    <!-- legs -->
    <line x1="92" y1="86" x2="92" y2="94" stroke="#D85A30" stroke-width="6" stroke-linecap="round"/>
    <line x1="108" y1="86" x2="108" y2="94" stroke="#D85A30" stroke-width="6" stroke-linecap="round"/>
    <!-- head -->
    <rect x="84" y="30" width="32" height="22" rx="7"/>
    <!-- antenna -->
    <circle cx="100" cy="18" r="3.5"/>
    <line x1="100" y1="21.5" x2="100" y2="30" stroke="#D85A30" stroke-width="3"/>
    <!-- eyes (cut out) -->
    <circle cx="93" cy="41" r="3" fill="#FFFFFF"/>
    <circle cx="107" cy="41" r="3" fill="#FFFFFF"/>
    <!-- torso / chest plate with M² badge -->
    <rect x="78" y="54" width="44" height="26" rx="7"/>
    <text x="98" y="74" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="17" fill="#FFFFFF">M</text>
    <text x="111" y="68" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="11" fill="#FFFFFF">2</text>
  </g>
</svg>
